<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Diagnostics System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css')}}">
</head>

<body class="bg-light">

    <div class="container-fluid pt-3">
        <div class="row gx-4">
            <!-- Sidebar Management Panel -->
            <div class="col-md-3">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-dark text-white text-center fw-bold">
                        <h5 class="mb-0">🔌 Monitoring Dashboard</h5>
                    </div>
                    <div class="card-body">
                        <h6>Add Device</h6>
                        <form id="addDeviceForm">
                            <div class="mb-2">
                                <input type="text" class="form-control" id="deviceName"
                                    placeholder="Name (e.g., Main Router)" required>
                            </div>
                            <div class="mb-2">
                                <input type="text" class="form-control" id="deviceIp"
                                    placeholder="IP Address (e.g., 192.168.1.1)" required>
                            </div>
                            <div class="mb-2">
                                <input type="number" step="0.0001" class="form-control" id="deviceLat"
                                    placeholder="Latitude (Optional)">
                            </div>
                            <div class="mb-2">
                                <input type="number" step="0.0001" class="form-control" id="deviceLng"
                                    placeholder="Longitude (Optional)">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Add Device</button>
                        </form>

                        <hr>

                        <h6>Device Summary</h6>
                        <div class="d-flex justify-content-between text-center align-items-center mb-2">
                            <div class="p-2 w-100 bg-secondary rounded me-2"><span
                                    class="text-white d-block">Total</span> <span id="totalCount"
                                    class="text-white fw-bold fs-4">0</span></div>
                            <div class="p-2 w-100 bg-success rounded me-2"><span class="text-white d-block">Up</span>
                                <span id="onlineCount" class="text-white fw-bold fs-4">0</span>
                            </div>
                            <div class="p-2 w-100 bg-danger rounded"><span class="text-white d-block">Down</span> <span
                                    id="offlineCount" class="text-white fw-bold fs-4">0</span></div>
                        </div>
                    </div>
                </div>

                <!-- List of actively monitored devices -->
                <div class="list-group" id="devicesListWrapper"></div>
            </div>

            <!-- Main Display Panel -->
            <div class="col-md-9">
                <div class="card shadow-sm mb-4">
                    <div class="card-body p-0">
                        <div id="map" style="width: 100%; height: 400px; border-radius: 5px;"></div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5><span id="chartTitle">Latency Metrics</span></h5>
                        <p class="text-muted small">Select a device from the list to view real-time latency.</p>
                        <div style="position: relative; height: 180px; width: 100%;">
                            <canvas id="latencyChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>

</body>

</html>
